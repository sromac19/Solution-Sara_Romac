services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://tickethub:tickethub@db:5432/tickethub
      ENVIRONMENT: docker
      LOG_LEVEL: INFO
      SYNC_INTERVAL_SECONDS: 300
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tickethub
      POSTGRES_PASSWORD: tickethub
      POSTGRES_DB: tickethub
    ports:
      - "5432:5432"
    volumes:
      - tickethub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickethub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  tickethub_pgdata:
